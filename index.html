<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikesh Regmi</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
  width: 100%;
  height: 100%;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* ENTER SCREEN */
#enter-screen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
}

#enter-text {
  font-size: 24px;
  text-shadow: 0 0 20px #00f;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.5; }
  50% { opacity: 1; }
  100% { opacity: 0.5; }
}

/* PARTICLES */
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* MAIN */
.container {
  display: none;
  position: relative;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
  padding: 20px;
}

/* LOGO */
.profile {
  width: 300px;
  border-radius: 50%;
  border: 2px solid Blue;
}

/* NAME */
h1 {
  margin: 10px;
  font-size: 22px;
  color: #00f;
}

/* TYPING */
#typing {
  font-size: 14px;
  color: #00f;
  height: 20px;
}

/* ICON BAR (BOTTOM HORIZONTAL) */
.icon-bar {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: row;
  gap: 20px;
}

.icon-bar a {
  font-size: 28px;
  color: white;
  background: rgba(0,0,0,0.3);
  padding: 15px;
  border-radius: 50%;
  border: 2px solid #00f;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.3s;
  animation: iconGlow 2s infinite alternate;
}

.icon-bar a:hover {
  background: #00f;
  transform: scale(1.4);
  box-shadow: 0 0 25px #00f, 0 0 50px #00f;
}

/* ICON PULSE ANIMATION */
@keyframes iconGlow {
  0% { box-shadow: 0 0 5px #00f; }
  50% { box-shadow: 0 0 15px #00f, 0 0 25px #00f; }
  100% { box-shadow: 0 0 5px #00f; }
}

/* ICON COLORS */
.icon-bar .fa-facebook, .icon-bar .fa-instagram, 
.icon-bar .fa-youtube, .icon-bar .fa-discord, 
.icon-bar .fa-gamepad {
  color: #00f;
}

/* VISITOR COUNTER */
.counter {
  margin-top: 15px;
  font-size: 12px;
  color: #00f;
}

/* MOBILE */
@media (max-width: 500px) {
  h1 { font-size: 18px; }
  .profile { width: 80px; }
  .icon-bar a { font-size: 24px; padding: 12px; }
}
</style>
</head>

<body>

<!-- ENTER SCREEN -->
<div id="enter-screen" onclick="enterSite()">
  <div id="enter-text">Click to Enter</div>
</div>

<!-- PARTICLES -->
<div id="particles-js"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="Bairan.mp3" type="audio/mpeg">
</audio>

<!-- MAIN -->
<div class="container" id="main">

  <img src="logo.jpg" class="profile">
  <h1>Nikesh Regmi</h1>
  <div id="typing"></div>

  <!-- VISITOR COUNTER -->
  <div class="counter">
    Visitors: <span id="visit-count">Loading...</span>
  </div>

</div>

<!-- ICON BAR -->
<div class="icon-bar">
  <a href="https://www.facebook.com/nikesh.regmi.2025"><i class="fab fa-facebook"></i></a>
  <a href="https://www.instagram.com/nikeshregmi506"><i class="fab fa-instagram"></i></a>
  <a href="https://www.youtube.com/@nr_nepal"><i class="fab fa-youtube"></i></a>
  <a href="https://discord.gg/HesBZtv4"><i class="fab fa-discord"></i></a>
  <a href="https://www.roblox.com/users/profile?username=dragonsign_4"><i class="fas fa-gamepad"></i></a>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
function enterSite() {
  document.getElementById("enter-screen").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("music").play();
}

/* SPARKLING BLUE PARTICLES */
particlesJS("particles-js", {
  particles: {
    number: { value: 150 },
    color: { value: "#00f" },
    shape: { type: "circle" },
    opacity: { value: 0.9, anim: { enable: true, speed: 1, opacity_min: 0.3, sync: false } },
    size: { value: 4, random: true, anim: { enable: true, speed: 2, size_min: 2, sync: false } },
    move: { enable: true, speed: 2, random: true, straight: false, bounce: false },
    line_linked: { enable: true, distance: 150, color: "#00f", opacity: 0.5, width: 1 },
    twinkle: { enable: true, frequency: 0.05, opacity_min: 0.3 }
  },
  interactivity: {
    detect_on: "canvas",
    events: {
      onhover: { enable: true, mode: "repulse" },
      onclick: { enable: true, mode: "push" }
    },
    modes: {
      repulse: { distance: 120 },
      push: { particles_nb: 4 }
    }
  }
});

/* TYPING EFFECT */
const text = ["Welcome to my profile", "Follow me 🚀", "Join my Discord 🔥"];
let i = 0, j = 0, current = "", isDeleting = false;
function type() {
  current = text[i];
  if (isDeleting) j--; else j++;
  document.getElementById("typing").innerHTML = current.substring(0, j);
  if (!isDeleting && j === current.length) {
    isDeleting = true;
    setTimeout(type, 1000);
  } else if (isDeleting && j === 0) {
    isDeleting = false;
    i = (i + 1) % text.length;
    setTimeout(type, 300);
  } else {
    setTimeout(type, isDeleting ? 50 : 100);
  }
}
type();

/* VISITOR COUNTER */
let count = localStorage.getItem("visits");
if (!count) { count = 1; } else { count = parseInt(count) + 1; }
localStorage.setItem("visits", count);
document.getElementById("visit-count").innerText = count;
</script>

</body>
</html>
